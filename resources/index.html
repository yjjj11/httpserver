<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            text-align: center;
            font-family: sans-serif;
            padding: 20px;
        }
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(130deg, #667eea 0%, #764ba2 100%);
        }
        /* 装饰性几何图形（尺寸放大） */
        .shape1 { position: absolute; top: 10%; left: 10%; width: 200px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        .shape2 { position: absolute; bottom: 15%; right: 15%; width: 250px; height: 250px; background: rgba(255,255,255,0.05); border-radius: 20px; transform: rotate(45deg); }
        h1 { 
            margin-bottom: 3rem; 
            font-size: 3.5rem; /* 标题放大 */
            text-shadow: 0 2px 10px rgba(0,0,0,0.2); 
        }
        .buttons { display: flex; gap: 1.5rem; }
        a {
            padding: 1.2rem 3rem; /* 按钮内边距加大 */
            text-decoration: none;
            border-radius: 6px; /* 圆角加大 */
            font-weight: bold;
            font-size: 1.2rem; /* 按钮文字放大 */
            transition: 0.3s;
        }
        .login { background: white; color: #667eea; }
        .register { background: transparent; color: white; border: 2px solid white; }
        a:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        /* 响应式调整 */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .buttons { flex-direction: column; }
            a { padding: 1rem 2rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="shape1"></div>
    <div class="shape2"></div>
    <h1>欢迎回来</h1>
    <div class="buttons">
        <a href="login.html" class="login">登录</a>
        <a href="register.html" class="register">注册</a>
    </div>
</body>
</html>
