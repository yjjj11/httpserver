<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(130deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }
        .shape1 { 
            top: 20%; 
            right: 15%; 
            width: 120px; 
            height: 120px; 
            animation-delay: 0s;
        }
        .shape2 { 
            bottom: 20%; 
            left: 10%; 
            width: 180px; 
            height: 180px; 
            border-radius: 20px; 
            transform: rotate(15deg);
            animation-delay: -2s;
        }
        .shape3 {
            top: 40%;
            left: 20%;
            width: 80px;
            height: 80px;
            animation-delay: -4s;
        }
        .card { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 2.5rem; 
            border-radius: 16px; 
            width: 380px; 
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transform-style: preserve-3d;
            perspective: 1000px;
        }
        h1 { 
            margin-bottom: 1.8rem; 
            text-align: center; 
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            font-weight: 600;
            letter-spacing: 1px;
        }
        .input-group { 
            margin-bottom: 1.5rem; 
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        input { 
            width: 100%; 
            padding: 1rem; 
            border: none; 
            border-radius: 8px; 
            background: rgba(255, 255, 255, 0.85); 
            margin-top: 0.3rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }
        button { 
            width: 100%; 
            padding: 1rem; 
            background: white; 
            color: #667eea; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-top: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            background: #f8f9fa;
        }
        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .links { 
            display: flex; 
            justify-content: center; 
            margin-top: 1.5rem; 
            font-size: 0.95rem; 
        }
        a { 
            color: white; 
            opacity: 0.9; 
            text-decoration: none; 
            transition: opacity 0.3s ease;
            position: relative;
        }
        a:after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: white;
            transition: width 0.3s ease;
        }
        a:hover { 
            opacity: 1; 
        }
        a:hover:after {
            width: 100%;
        }
        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 0.8rem;
            text-align: center;
            display: none;
            background: rgba(255, 255, 255, 0.15);
            padding: 0.6rem;
            border-radius: 6px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        .success-message {
            color: #4cd964;
            font-size: 0.9rem;
            margin-top: 0.8rem;
            text-align: center;
            display: none;
            background: rgba(255, 255, 255, 0.15);
            padding: 0.6rem;
            border-radius: 6px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }
        .logo {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }
        .footer {
            position: absolute;
            bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bg"></div>
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        
        <div class="logo">AuthSystem</div>
        
        <form id="registerForm" method="POST" action="/register.html">
            <div class="card">
                <h1>账号注册</h1>
                <div class="input-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请设置用户名" required>
                </div>
                <div class="input-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请设置密码" required>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" required>
                </div>
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>
                <button type="submit">注册</button>
                <div class="links">
                    <a href="login.html">已有账号？登录</a>
                </div>
            </div>
        </form>
        
        <div class="footer">© 2023 认证系统 | 安全注册</div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            // 注册表单验证
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // 隐藏所有消息
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            if (!username) {
                e.preventDefault();
                errorMessage.textContent = '请设置用户名';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (username.length < 3) {
                e.preventDefault();
                errorMessage.textContent = '用户名长度不能少于3个字符';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (!password) {
                e.preventDefault();
                errorMessage.textContent = '请设置密码';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                e.preventDefault();
                errorMessage.textContent = '密码长度不能少于6个字符';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                e.preventDefault();
                errorMessage.textContent = '两次输入的密码不一致';
                errorMessage.style.display = 'block';
                return;
            }
            
            // 显示注册成功消息
            successMessage.textContent = '注册中，请稍候...';
            successMessage.style.display = 'block';
        });
        
        // 实时验证
        document.getElementById('username').addEventListener('input', function() {
            const errorMessage = document.getElementById('errorMessage');
            if (this.value.trim() && (errorMessage.textContent.includes('用户名') || errorMessage.textContent.includes('用户'))) {
                errorMessage.style.display = 'none';
            }
        });
        
        document.getElementById('password').addEventListener('input', function() {
            const errorMessage = document.getElementById('errorMessage');
            if (this.value && (errorMessage.textContent.includes('密码') || errorMessage.textContent.includes('一致'))) {
                errorMessage.style.display = 'none';
            }
        });
        
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const errorMessage = document.getElementById('errorMessage');
            if (this.value && errorMessage.textContent.includes('一致')) {
                errorMessage.style.display = 'none';
            }
        });
    </script>
</body>
</html>
