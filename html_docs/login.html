<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建账户 - 注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 配置Tailwind自定义颜色和字体 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC9',
                        neutral: '#F5F7FA',
                        dark: '#1D2129'
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .input-focus {
                @apply focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none;
            }
            .btn-primary {
                @apply bg-primary text-white font-medium py-3 px-6 rounded-lg hover:bg-primary/90 active:bg-primary/80 transition-all duration-300 transform hover:-translate-y-0.5 active:translate-y-0 shadow-lg hover:shadow-xl active:shadow-md;
            }
            .card {
                @apply bg-white rounded-2xl shadow-xl overflow-hidden transition-all duration-300 hover:shadow-2xl;
            }
        }
    </style>
</head>
<body class="font-inter bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen flex items-center justify-center p-4 md:p-8">
    <div class="w-full max-w-6xl grid md:grid-cols-2 gap-8 items-center">
        <!-- 左侧信息区域 -->
        <div class="hidden md:block">
            <div class="card p-8 md:p-12">
                <h2 class="text-[clamp(1.8rem,4vw,2.5rem)] font-bold text-dark mb-6">欢迎加入我们的社区</h2>
                <p class="text-gray-600 mb-8 text-lg">创建账户，开启全新体验。加入数百万用户的选择，享受安全、便捷的服务。</p>
                
                <div class="space-y-6">
                    <div class="flex items-start gap-4">
                        <div class="bg-primary/10 p-3 rounded-full text-primary">
                            <i class="fa fa-shield text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-lg mb-1">安全保障</h3>
                            <p class="text-gray-600">您的个人信息将得到全方位保护，我们采用银行级加密技术。</p>
                        </div>
                    </div>
                    
                    <div class="flex items-start gap-4">
                        <div class="bg-primary/10 p-3 rounded-full text-primary">
                            <i class="fa fa-bolt text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-lg mb-1">便捷体验</h3>
                            <p class="text-gray-600">一次注册，多平台同步，随时随地访问您的账户。</p>
                        </div>
                    </div>
                    
                    <div class="flex items-start gap-4">
                        <div class="bg-primary/10 p-3 rounded-full text-primary">
                            <i class="fa fa-headphones text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-lg mb-1">24/7 支持</h3>
                            <p class="text-gray-600">我们的客服团队随时为您提供帮助，解决您遇到的任何问题。</p>
                        </div>
                    </div>
                </div>
                
                <div class="mt-12">
                    <img src="https://picsum.photos/id/325/600/300" alt="用户社区" class="rounded-xl w-full h-auto object-cover shadow-md">
                </div>
            </div>
        </div>
        
        <!-- 右侧注册表单 -->
        <div>
            <div class="card p-6 md:p-8">
                <div class="text-center mb-8">
                    <h1 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-dark mb-2">创建新账户</h1>
                    <p class="text-gray-500">已有账户？<a href="#" class="text-primary font-medium hover:underline">立即登录</a></p>
                </div>
                
                <form id="registrationForm" class="space-y-5">
                    <!-- 姓名 -->
                    <div>
                        <label for="fullname" class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                                <i class="fa fa-user"></i>
                            </span>
                            <input type="text" id="fullname" name="fullname" 
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg input-focus transition-all"
                                placeholder="请输入您的姓名" required>
                        </div>
                    </div>
                    
                    <!-- 用户名 -->
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                                <i class="fa fa-at"></i>
                            </span>
                            <input type="text" id="username" name="username" 
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg input-focus transition-all"
                                placeholder="请创建用户名" required>
                            <div class="hidden absolute right-3 top-3 text-green-500" id="usernameValid">
                                <i class="fa fa-check-circle"></i>
                            </div>
                            <div class="hidden absolute right-3 top-3 text-red-500" id="usernameInvalid">
                                <i class="fa fa-times-circle"></i>
                            </div>
                        </div>
                        <p class="mt-1 text-xs text-gray-500">用户名长度为4-20个字符，可包含字母、数字和下划线</p>
                    </div>
                    
                    <!-- 电子邮件 -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">电子邮件</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                                <i class="fa fa-envelope"></i>
                            </span>
                            <input type="email" id="email" name="email" 
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg input-focus transition-all"
                                placeholder="your@email.com" required>
                        </div>
                    </div>
                    
                    <!-- 密码 -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                                <i class="fa fa-lock"></i>
                            </span>
                            <input type="password" id="password" name="password" 
                                class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg input-focus transition-all"
                                placeholder="请创建密码" required>
                            <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 hover:text-primary">
                                <i class="fa fa-eye-slash"></i>
                            </button>
                        </div>
                        <p class="mt-1 text-xs text-gray-500">密码至少8个字符，包含大小写字母、数字和特殊符号</p>
                    </div>
                    
                    <!-- 确认密码 -->
                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                                <i class="fa fa-lock"></i>
                            </span>
                            <input type="password" id="confirmPassword" name="confirmPassword" 
                                class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg input-focus transition-all"
                                placeholder="请再次输入密码" required>
                            <button type="button" id="toggleConfirmPassword" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 hover:text-primary">
                                <i class="fa fa-eye-slash"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- 同意条款 -->
                    <div class="flex items-start">
                        <div class="flex items-center h-5">
                            <input id="terms" name="terms" type="checkbox" class="w-4 h-4 text-primary focus:ring-primary border-gray-300 rounded" required>
                        </div>
                        <div class="ml-3 text-sm">
                            <label for="terms" class="text-gray-600">我同意<a href="#" class="text-primary hover:underline">服务条款</a>和<a href="#" class="text-primary hover:underline">隐私政策</a></label>
                        </div>
                    </div>
                    
                    <!-- 注册按钮 -->
                    <button type="submit" class="w-full btn-primary flex items-center justify-center gap-2">
                        <span>创建账户</span>
                        <i class="fa fa-arrow-right"></i>
                    </button>
                    
                    <!-- 其他注册方式 -->
                    <div class="relative flex items-center py-2">
                        <div class="flex-grow border-t border-gray-200"></div>
                        <span class="flex-shrink mx-4 text-gray-500 text-sm">或使用以下方式注册</span>
                        <div class="flex-grow border-t border-gray-200"></div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-3">
                        <button type="button" class="flex items-center justify-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                            <i class="fa fa-google text-xl text-gray-700"></i>
                        </button>
                        <button type="button" class="flex items-center justify-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                            <i class="fa fa-facebook-official text-xl text-blue-600"></i>
                        </button>
                        <button type="button" class="flex items-center justify-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                            <i class="fa fa-github text-xl text-gray-800"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 表单验证和交互逻辑
        document.addEventListener('DOMContentLoaded', function() {
            const registrationForm = document.getElementById('registrationForm');
            const username = document.getElementById('username');
            const usernameValid = document.getElementById('usernameValid');
            const usernameInvalid = document.getElementById('usernameInvalid');
            const password = document.getElementById('password');
            const confirmPassword = document.getElementById('confirmPassword');
            const togglePassword = document.getElementById('togglePassword');
            const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
            
            // 用户名验证
            username.addEventListener('input', function() {
                const usernameValue = username.value.trim();
                // 用户名规则：4-20个字符，包含字母、数字和下划线
                const usernameRegex = /^[a-zA-Z0-9_]{4,20}$/;
                
                if (usernameValue === '') {
                    usernameValid.classList.add('hidden');
                    usernameInvalid.classList.add('hidden');
                    username.classList.remove('border-green-500', 'border-red-500');
                } else if (usernameRegex.test(usernameValue)) {
                    usernameValid.classList.remove('hidden');
                    usernameInvalid.classList.add('hidden');
                    username.classList.remove('border-red-500');
                    username.classList.add('border-green-500');
                } else {
                    usernameValid.classList.add('hidden');
                    usernameInvalid.classList.remove('hidden');
                    username.classList.remove('border-green-500');
                    username.classList.add('border-red-500');
                }
            });
            
            // 密码显示/隐藏切换
            togglePassword.addEventListener('click', function() {
                const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                password.setAttribute('type', type);
                
                // 切换图标
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
            
            // 确认密码显示/隐藏切换
            toggleConfirmPassword.addEventListener('click', function() {
                const type = confirmPassword.getAttribute('type') === 'password' ? 'text' : 'password';
                confirmPassword.setAttribute('type', type);
                
                // 切换图标
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
            
            // 密码匹配验证
            confirmPassword.addEventListener('input', function() {
                if (password.value !== confirmPassword.value) {
                    confirmPassword.setCustomValidity('两次输入的密码不匹配');
                    confirmPassword.classList.add('border-red-500');
                    confirmPassword.classList.remove('border-green-500');
                } else {
                    confirmPassword.setCustomValidity('');
                    confirmPassword.classList.remove('border-red-500');
                    confirmPassword.classList.add('border-green-500');
                }
            });
            
            // 表单提交处理
            registrationForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 在实际应用中，这里会有AJAX请求发送表单数据到服务器
                // 这里仅做演示
                const formData = new FormData(this);
                const formValues = Object.fromEntries(formData.entries());
                
                console.log('表单提交数据:', formValues);
                
                // 显示成功消息（实际应用中会根据服务器响应处理）
                alert('注册成功！我们已向您的邮箱发送了验证链接。');
                this.reset();
                
                // 重置样式
                usernameValid.classList.add('hidden');
                usernameInvalid.classList.add('hidden');
                username.classList.remove('border-green-500', 'border-red-500');
                confirmPassword.classList.remove('border-green-500', 'border-red-500');
            });
        });
    </script>
</body>
</html>
